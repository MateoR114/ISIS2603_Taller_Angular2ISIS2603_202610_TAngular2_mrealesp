<div>
  <h3>Crear Ciudad</h3>

  <label>Nombre:
    <input [(ngModel)]="cityName" placeholder="Nombre de la ciudad" />
  </label>

  <label>País:
    <select [(ngModel)]="selectedCountryId">
      <option [ngValue]="null" disabled>Seleccione un país</option>
      <option *ngFor="let c of countries" [ngValue]="c.id">{{ c.name }}</option>
    </select>
  </label>

  <button (click)="save()" [disabled]="!isFormValid()">Guardar</button>
  <button (click)="cancel()">Cancelar</button>
</div>
